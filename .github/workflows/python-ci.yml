name: NeuTTS Studio CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y espeak-ng libespeak-ng-dev
        sudo apt-get install -y build-essential cmake pkg-config

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest black isort

    - name: Lint with flake8
      run: |
        flake8 core/ modules/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Check formatting
      run: |
        black --check core/ modules/ run.py config.py || true

    - name: Check imports
      run: |
        isort --check-only core/ modules/ run.py config.py || true

    - name: Verify imports
      run: |
        python -c "import config; print('Config OK')"
        python -c "from core.engine import engine; print('Engine OK')"
        python -c "from core.ui import menu; print('UI OK')"

    - name: Check syntax
      run: |
        python -m py_compile core/*.py modules/*.py run.py config.py

    - name: Test help (no model load)
      run: |
        python run.py --help || true